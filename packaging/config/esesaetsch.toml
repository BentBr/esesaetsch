# /etc/esesaetsch/config.toml — installed as a conffile; your edits survive upgrades.
# Full reference: https://github.com/BentBr/esesaetsch/blob/main/docs/user-guide/configuration.md

[server]
bind     = "0.0.0.0"
port     = 2222
host_key = "/etc/esesaetsch/host_key"   # generated by the package postinstall if absent

[auth]
password_enabled  = false
pubkey_enabled    = true
cert_enabled      = false
max_auth_attempts = 3

[auth.authorized_keys]
# Add your users here before enabling the service, e.g.:
# alice = ["ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... alice@host"]
