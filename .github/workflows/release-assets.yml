name: release-assets

# Triggered when release-please publishes a GitHub Release (after the
# auto-generated release PR is merged into main). The flow is:
#
#   1. fmt + clippy + tests on each runnable platform
#      (Linux x86_64, macOS aarch64, Windows x86_64)
#   2. only if every check passes, cross-build all 5 release targets
#      and upload them as assets on the just-published release.
#
# This guarantees that no broken artefact is ever attached to a release.

on:
  release:
    types: [published]

permissions:
  contents: write

# Notes on security: the only event-derived value we use in run steps is
# `github.event.release.tag_name`. It is bound to an env var and passed
# as a positional argument to `gh release upload`, never interpolated
# into a shell command string.

jobs:

  # ---------- gate: format + lint + tests ----------

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly clippy --workspace --all-targets -- -D clippy::all -D warnings -D clippy::pedantic -D clippy::nursery

  test-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ---------- build + upload (only after gate is green) ----------

  build-and-upload:
    name: ${{ matrix.target }}
    needs: [fmt, clippy, test-linux-x64, test-macos-arm, test-windows-x64]
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            archive-ext: tar.gz
            bin-ext: ""
            cross-linker: ""
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            archive-ext: tar.gz
            bin-ext: ""
            cross-linker: gcc-aarch64-linux-gnu
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            archive-ext: tar.gz
            bin-ext: ""
            cross-linker: ""
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            archive-ext: zip
            bin-ext: .exe
            cross-linker: ""
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            archive-ext: zip
            bin-ext: .exe
            cross-linker: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross linker (if needed)
        if: matrix.cross-linker != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross-linker }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive-ext == 'tar.gz'
        env:
          TAG: ${{ github.event.release.tag_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          STAGE="esesätsch-${TAG}-${TARGET}"
          mkdir -p "$STAGE"
          cp "target/${TARGET}/release/esesaetsch" "$STAGE/esesätsch"
          cp LICENSE NOTICE README.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive-ext == 'zip'
        env:
          TAG: ${{ github.event.release.tag_name }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $stage = "esesätsch-${env:TAG}-${env:TARGET}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${env:TARGET}/release/esesaetsch.exe" "$stage/esesätsch.exe"
          Copy-Item LICENSE,NOTICE,README.md $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ASSET=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "$ASSET" --clobber
        shell: bash
