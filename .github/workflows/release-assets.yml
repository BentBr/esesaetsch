name: release-assets

# Build and attach release artefacts. Triggered:
#   - by release-please.yml after `release_created: true`
#   - directly on `release: published` (manual or non-release-please tag)
#
# This workflow assumes the gate (fmt + clippy + tests + cross-builds)
# has already run as part of the release PR's CI. We rebuild here for
# release-profile artefacts and upload them.

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to attach the assets to (e.g., v0.1.0)
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            archive-ext: tar.gz
            bin-ext: ""
            install: linux
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            archive-ext: tar.gz
            bin-ext: ""
            install: linux-arm
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            archive-ext: tar.gz
            bin-ext: ""
            install: macos
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            archive-ext: zip
            bin-ext: .exe
            install: windows
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            archive-ext: zip
            bin-ext: .exe
            install: windows
    steps:
      - uses: actions/checkout@v4

      # @nightly matches rust-toolchain.toml — the `targets:` parameter
      # only adds the target to the toolchain it installs, so it must
      # match the one cargo will actually run under.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install build deps (Linux x86_64)
        if: matrix.install == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev libclang-dev

      - name: Install build deps (Linux ARM64 cross)
        if: matrix.install == 'linux-arm'
        run: ./.github/scripts/install-linux-arm-deps.sh

      - name: Install build deps (macOS)
        if: matrix.install == 'macos'
        run: brew install llvm

      - name: Build release binary
        env:
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.install == 'linux-arm' && '1' || '' }}
          LIBCLANG_PATH:          ${{ matrix.install == 'macos' && '/opt/homebrew/opt/llvm/lib' || '' }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ matrix.install == 'macos' && '/opt/homebrew/opt/llvm/lib' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve tag name
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ -n "${INPUT_TAG:-}" ]]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$EVENT_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (unix)
        if: matrix.archive-ext == 'tar.gz'
        env:
          TAG:    ${{ steps.tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          STAGE="esesätsch-${TAG}-${TARGET}"
          mkdir -p "$STAGE"
          cp "target/${TARGET}/release/esesaetsch" "$STAGE/esesätsch"
          cp LICENSE NOTICE README.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive-ext == 'zip'
        env:
          TAG:    ${{ steps.tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $stage = "esesätsch-${env:TAG}-${env:TARGET}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${env:TARGET}/release/esesaetsch.exe" "$stage/esesätsch.exe"
          Copy-Item LICENSE,NOTICE,README.md $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ASSET=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: gh release upload "$TAG" "$ASSET" --clobber
        shell: bash
