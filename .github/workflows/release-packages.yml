name: release-packages

# Build native installation packages and attach them to a release.
# Self-contained: builds every binary it needs; does not depend on
# release-assets.yml. Mirrors that workflow's triggers.

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to attach assets to (e.g., v0.1.0)
        required: true
        type: string
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to attach assets to
        required: true
        type: string
  pull_request:
    paths:
      - 'packaging/**'
      - '.github/workflows/release-packages.yml'
      - 'crates/esesätsch/src/main.rs'

permissions:
  contents: write

env:
  NFPM_VERSION: v2.43.0

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            install: linux
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            install: linux-arm
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            install: linux-musl
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-latest
            install: linux-musl-arm
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            install: macos
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            install: macos
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            install: windows
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            install: windows
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install build deps (Linux x86_64 gnu)
        if: matrix.install == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev libclang-dev

      - name: Install build deps (Linux arm64 gnu cross)
        if: matrix.install == 'linux-arm'
        run: ./.github/scripts/install-linux-arm-deps.sh

      - name: Install build deps (Linux musl)
        if: startsWith(matrix.install, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools libclang-dev

      - name: Install arm64 musl cross linker
        if: matrix.install == 'linux-musl-arm'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install build deps (macOS)
        if: matrix.install == 'macos'
        run: brew install llvm

      - name: Build release binary
        shell: bash
        env:
          PKG_CONFIG_ALLOW_CROSS: ${{ contains(matrix.install, 'arm') && '1' || '' }}
          LIBCLANG_PATH: ${{ matrix.install == 'macos' && '/opt/homebrew/opt/llvm/lib' || '' }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ matrix.install == 'macos' && '/opt/homebrew/opt/llvm/lib' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p esesaetsch

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/esesaetsch${{ contains(matrix.target, 'windows') && '.exe' || '' }}
          if-no-files-found: error

  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - id: t
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "${INPUT_TAG:-}" ]; then echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT";
          else echo "tag=$EVENT_TAG" >> "$GITHUB_OUTPUT"; fi

  package-linux:
    needs: [build, resolve-tag]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg_arch: amd64
            gnu_target: x86_64-unknown-linux-gnu
            musl_target: x86_64-unknown-linux-musl
          - pkg_arch: arm64
            gnu_target: aarch64-unknown-linux-gnu
            musl_target: aarch64-unknown-linux-musl
    env:
      VERSION: ${{ needs.resolve-tag.outputs.tag }}
      PKG_ARCH: ${{ matrix.pkg_arch }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${NFPM_VERSION}
      - name: Download gnu binary
        uses: actions/download-artifact@v4
        with:
          name: bin-${{ matrix.gnu_target }}
          path: gnu
      - name: Download musl binary
        uses: actions/download-artifact@v4
        with:
          name: bin-${{ matrix.musl_target }}
          path: musl

      - name: Stage nfpm inputs
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/completions
          # Build a host-arch binary to emit man/completions (arch-independent).
          sudo apt-get update && sudo apt-get install -y libpam0g-dev libclang-dev
          cargo build --release -p esesaetsch
          HOSTBIN=target/release/esesaetsch
          cp gnu/esesaetsch dist/esesaetsch
          chmod +x dist/esesaetsch
          "$HOSTBIN" man | gzip -9 > dist/esesaetsch.1.gz
          "$HOSTBIN" completions bash > dist/completions/esesaetsch.bash
          "$HOSTBIN" completions zsh  > dist/completions/_esesaetsch
          "$HOSTBIN" completions fish > dist/completions/esesaetsch.fish

      - name: Build packages (deb/rpm/arch from gnu, apk from musl)
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="$PATH:$(go env GOPATH)/bin"
          mkdir -p out
          # glibc distros: deb/rpm/archlinux use the gnu binary already staged in dist/.
          for fmt in deb rpm archlinux; do
            nfpm package -f packaging/nfpm.yaml -p "$fmt" -t out/
          done
          # Alpine is musl: rebuild the staged binary from the musl artifact for the apk.
          cp musl/esesaetsch dist/esesaetsch
          nfpm package -f packaging/nfpm.yaml -p apk -t out/

      - name: Build static musl tarball
        shell: bash
        env:
          TARGET: ${{ matrix.musl_target }}
        run: |
          set -euxo pipefail
          STAGE="esesätsch-${VERSION}-${TARGET}"
          mkdir -p "$STAGE"
          cp musl/esesaetsch "$STAGE/esesätsch"
          chmod +x "$STAGE/esesätsch"
          cp LICENSE NOTICE README.md "$STAGE/"
          tar -czf "out/${STAGE}.tar.gz" "$STAGE"

      - name: Upload package artifacts (for smoke tests)
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.pkg_arch }}
          path: out/*
          if-no-files-found: error

      - name: Upload to release
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: gh release upload "$TAG" out/* --clobber

  package-macos:
    needs: [build, resolve-tag]
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Download mac arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: bin-aarch64-apple-darwin
          path: mac-arm64
      - name: Download mac x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-apple-darwin
          path: mac-x64

      - name: Build universal .pkg
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x mac-arm64/esesaetsch mac-x64/esesaetsch
          lipo -create -output esesaetsch-universal mac-arm64/esesaetsch mac-x64/esesaetsch

          ROOT=pkgroot
          mkdir -p "$ROOT/usr/local/bin" "$ROOT/Library/LaunchDaemons" "$ROOT/etc/esesaetsch" "$ROOT/usr/local/share/man/man1"
          cp esesaetsch-universal "$ROOT/usr/local/bin/esesaetsch"
          chmod 755 "$ROOT/usr/local/bin/esesaetsch"
          cp packaging/macos/com.esesaetsch.server.plist "$ROOT/Library/LaunchDaemons/"
          cp packaging/config/esesaetsch.toml "$ROOT/etc/esesaetsch/config.toml"
          ./esesaetsch-universal man | gzip -9 > "$ROOT/usr/local/share/man/man1/esesaetsch.1.gz"

          # Strip the leading 'v' from the tag for CFBundle-style version.
          PKGVER="${VERSION#v}"
          pkgbuild --root "$ROOT" \
            --identifier com.esesaetsch.server \
            --version "$PKGVER" \
            --scripts packaging/macos/scripts \
            --install-location / \
            component.pkg
          productbuild --distribution packaging/macos/distribution.xml \
            --package-path . \
            "esesätsch-${VERSION}-universal-apple-darwin.pkg"

      - name: Upload to release
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: gh release upload "$TAG" "esesätsch-${VERSION}-universal-apple-darwin.pkg" --clobber

  package-windows:
    needs: [build, resolve-tag]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: x64
          - target: aarch64-pc-windows-msvc
            label: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-wix
        run: cargo install cargo-wix --version 0.3.9 --locked
      - name: Download windows binary
        uses: actions/download-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: target/${{ matrix.target }}/release
      - name: Build .msi
        shell: bash
        env:
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euxo pipefail
          cargo wix --no-build --nocapture \
            -p esesaetsch \
            --target ${{ matrix.target }} \
            --install-version "${TAG#v}" \
            packaging/windows/main.wxs \
            --output "esesaetsch-${TAG}-${{ matrix.label }}.msi"
      - name: Upload to release
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: gh release upload "$TAG" "esesaetsch-${TAG}-${{ matrix.label }}.msi" --clobber

  smoke-linux:
    needs: package-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:stable
            fmt: deb
            install: dpkg -i /pkgs/*.deb || apt-get -y install -f
            pre: apt-get update
          - image: fedora:latest
            fmt: rpm
            install: dnf -y install /pkgs/*.rpm
            pre: "true"
          - image: archlinux:latest
            fmt: pkg.tar.zst
            install: pacman -U --noconfirm /pkgs/*.pkg.tar.zst
            pre: pacman -Sy --noconfirm
          - image: alpine:latest
            fmt: apk
            install: apk add --allow-untrusted /pkgs/*.apk
            pre: "true"
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Download amd64 packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-amd64
          path: /pkgs
      - name: Install and verify
        shell: sh
        run: |
          set -eux
          ${{ matrix.pre }}
          ${{ matrix.install }}
          esesaetsch --version
          test -f /usr/lib/systemd/system/esesaetsch.service
          test -f /etc/esesaetsch/config.toml
          test -f /usr/share/man/man1/esesaetsch.1.gz
          # postinstall host-key generation ran (or is runnable):
          esesaetsch gen-key --host-key /tmp/k && test -f /tmp/k

  checksums:
    needs: [package-linux, package-macos, package-windows, resolve-tag]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets and checksum
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail
          mkdir sums && cd sums
          gh release download "$TAG" --pattern '*' --skip-existing
          rm -f SHA256SUMS
          sha256sum * > SHA256SUMS
          gh release upload "$TAG" SHA256SUMS --clobber
