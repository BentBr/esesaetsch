name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:

  # Step 1: run release-please. It will:
  #   - On a normal `feat:` / `fix:` push: open or update a release PR
  #     bumping Cargo.toml versions + CHANGELOG.
  #   - On a merge of that release PR: publish a tagged GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      version:         ${{ steps.release.outputs.version }}
      prs_created:     ${{ steps.release.outputs.prs_created }}
      prs:             ${{ steps.release.outputs.prs }}
      pr_head_sha:     ${{ steps.get-pr-sha.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Get PR head SHA (for status reporting)
        id: get-pr-sha
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/github-script@v9
        env:
          PRS_OUTPUT: ${{ steps.release.outputs.prs }}
        with:
          script: |
            const prsOutput = process.env.PRS_OUTPUT;
            if (!prsOutput) return;
            let prs;
            try { prs = JSON.parse(prsOutput); } catch (e) { return; }
            if (!Array.isArray(prs) || prs.length === 0) return;
            const prNumber = prs[0].number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('sha', pr.head.sha);

  # Step 2: run the full CI workflow against the release-please PR.
  # GITHUB_TOKEN-triggered events don't auto-trigger other workflows, so
  # we call ci.yml explicitly here via `workflow_call`.
  ci-for-release-pr:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr_head_sha != '' && needs.release-please.outputs.release_created != 'true' }}
    uses: ./.github/workflows/ci.yml

  # Step 3: write a commit status back to the release PR so its
  # branch protection / required-checks see a "ci-gate" result.
  report-ci-status:
    needs: [release-please, ci-for-release-pr]
    if: ${{ always() && needs.release-please.outputs.pr_head_sha != '' && needs.release-please.outputs.release_created != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        env:
          SHA:       ${{ needs.release-please.outputs.pr_head_sha }}
          CI_RESULT: ${{ needs.ci-for-release-pr.result }}
        with:
          script: |
            const sha = process.env.SHA;
            const r   = process.env.CI_RESULT;
            if (!sha) return;
            const state = r === 'success' ? 'success'
                        : r === 'failure' ? 'failure'
                        : r === 'cancelled' ? 'error'
                        : 'pending';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha,
              state,
              context: 'ci-gate',
              description: state === 'success' ? 'All CI checks passed'
                         : state === 'failure' ? 'CI checks failed'
                         : state === 'error'   ? 'CI was cancelled'
                                                : 'CI is running',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  # Step 4: when a release was actually published (release PR was merged),
  # build the per-target binaries and upload them as release assets.
  release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release-assets.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  publish-packages:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release-packages.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
