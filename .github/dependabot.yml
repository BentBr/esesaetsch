version: 2
updates:
  # Rust dependencies (workspace root Cargo.toml + Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows/*.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      actions-all:
        patterns:
          - "*"