# examples/password.toml
# -------------------------------------------------------------------------
# Password authentication via the host OS (PAM on Linux/macOS, LogonUserW
# on Windows). The server verifies credentials against the local account
# database — there is no password list in this config.
#
# Important:
#   - The user account must exist on the host OS.
#   - On Linux/macOS the PAM service named "sshd" is used by default,
#     which means /etc/pam.d/sshd governs the policy (same as OpenSSH).
#   - The server process needs the privilege to consult the OS auth
#     stack: on Linux, root is required to read /etc/shadow via PAM;
#     on macOS the Open Directory PAM module handles this transparently
#     for the user invoking the binary.
#
# Start:
#   sudo esesätsch serve --config examples/password.toml   # Linux
#   esesätsch serve --config examples/password.toml        # macOS

[server]
bind     = "0.0.0.0"
port     = 2222
host_key = "./host_key"

[auth]
password_enabled  = true
pubkey_enabled    = false
cert_enabled      = false
max_auth_attempts = 3
